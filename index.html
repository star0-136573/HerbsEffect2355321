<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCM Comprehensive Flashcards</title>
    <style>
        :root { --bg: #f0f2f5; --card-bg: #ffffff; --text: #1e293b; --primary: #6366f1; --shadow: rgba(0, 0, 0, 0.1); }
        [data-theme="dark"] { --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --primary: #818cf8; --shadow: rgba(0, 0, 0, 0.4); }

        body { 
            font-family: 'PingFang HK', sans-serif; background-color: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; transition: 0.3s; overflow: hidden; 
        }

        .header { width: 95%; max-width: 500px; display: flex; justify-content: space-between; padding: 10px; flex-shrink: 0; }
        .container { flex-grow: 1; width: 95%; max-width: 550px; perspective: 1000px; display: flex; align-items: center; justify-content: center; min-height: 0; }
        
        .flashcard { width: 100%; height: 85%; max-height: 500px; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        
        .card-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; 
            box-shadow: 0 8px 20px var(--shadow); background: var(--card-bg); border: 1px solid rgba(128, 128, 128, 0.1); 
            display: flex; flex-direction: column; padding: 1.5rem; box-sizing: border-box;
        }
        
        .card-front { justify-content: center; align-items: center; text-align: center; }
        .card-back { transform: rotateY(180deg); overflow-y: auto; text-align: left; }

        .disease-title { font-size: 2.8rem; color: var(--primary); font-weight: bold; margin: 5px 0; }
        .section-header { font-size: 1.1rem; color: #e11d48; font-weight: bold; border-bottom: 2px solid #e11d48; margin: 12px 0 8px 0; padding-bottom: 2px; }
        
        .syndrome-item-box { margin-bottom: 10px; padding: 8px; background: rgba(128, 128, 128, 0.05); border-radius: 8px; }
        .syndrome-name-text { font-weight: bold; color: var(--primary); margin-bottom: 4px; display: block; }
        .symptom-tag-container { display: flex; flex-wrap: wrap; gap: 4px; }
        .symptom-tag { font-size: 0.75rem; background: rgba(99, 102, 241, 0.1); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(99, 102, 241, 0.2); }

        .formula-list { font-size: 0.85rem; line-height: 1.5; }
        .formula-row { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 3px 0; display: flex; justify-content: space-between; gap: 10px; }

        .controls { padding: 15px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        button, select { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .secondary { background: #64748b; }
        .mode-btn { background: #10b981; }
    </style>
</head>
<body>

    <div class="header">
        <select onchange="document.body.setAttribute('data-theme', this.value)">
            <option value="light">☀️ Light</option>
            <option value="dark">🌙 Dark</option>
        </select>
        <button class="mode-btn" id="modeBtn" onclick="toggleMode()">Mode: Syndrome View</button>
    </div>

    <div class="container">
        <div class="flashcard" id="card">
            <div class="card-face card-front" id="front-content"></div>
            <div class="card-face card-back" id="back-content"></div>
        </div>
    </div>

    <div class="controls">
        <button class="secondary" onclick="prevCard()">←</button>
        <span id="counter" style="font-weight:bold; min-width: 45px; text-align: center;">1 / 1</span>
        <button class="secondary" onclick="nextCard()">→</button>
        <button onclick="shuffleDeck()">🔀 Shuffle</button>
        <button onclick="select('I')">Internal</button>
        <button onclick="select('G')">Gynecology</button>
        <button onclick="select('P')">Pediatric</button> 
        <script src="MedData.js"></script>
    <script>
        var  disease = internal.concat(gynecology).concat(pediatric);
        var tcmData = tcmData1.concat(tcmData2).concat(tcmData3);



        let currentDeck = [];
        let currentIndex = 0;
        let isDiseaseMode = false;

        function select(s){
           if(s=='I') disease = internal;
           else if(s=='G') disease = gynecology;
          else disease=pediatric;
                      buildDeck()
        }
        function buildDeck() {
            currentDeck = [];
            if (isDiseaseMode) {
                currentDeck = disease.map(d => ({ ...d, type: 'disease' }));
            } else {
                disease.forEach(d => {
                    d.syndromes.forEach(s => {
                        currentDeck.push({ disease: d.disease, ...s, type: 'syndrome' });
                    });
                });
            }
            currentIndex = 0;
            updateCard();
        }

        function updateCard() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            const data = currentDeck[currentIndex];
            const front = document.getElementById('front-content');
            const back = document.getElementById('back-content');

            // Find all formulas for the parent disease regardless of mode
            const formulas = tcmData.filter(f => f.disease.trim() === data.disease.trim());
            const formulaHtml = `
                <div class="section-header">Relevant Formulas (${data.disease})</div>
                <div class="formula-list">
                    ${formulas.length > 0 ? formulas.map(f => `
                        <div class="formula-row"><strong>${f.syndrome}:</strong> <span>${f.formula}</span></div>
                    `).join('') : '<em>No formula data provided.</em>'}
                </div>
            `;

            if (data.type === 'disease') {
                front.innerHTML = `<div style="opacity:0.6">Disease Mastery</div><div class="disease-title">${data.disease}</div>`;
                back.innerHTML = `
                    <div class="section-header">Syndromes & Symptoms</div>
                    ${data.syndromes.map(s => `
                        <div class="syndrome-item-box">
                            <span class="syndrome-name-text">${s.name}</span>
                            <div class="symptom-tag-container">${s.symptoms.map(sym => `<span class="symptom-tag">${sym}</span>`).join('')}</div>
                        </div>
                    `).join('')}
                    ${formulaHtml}
                `;
            } else {
                front.innerHTML = `<div style="color:var(--primary); font-weight:bold">${data.disease}</div><div class="disease-title" style="font-size:2.2rem">${data.name}</div>`;
                back.innerHTML = `
                    <div class="section-header">Specific Symptoms (${data.name})</div>
                    <div class="symptom-tag-container" style="margin-bottom:10px">${data.symptoms.map(sym => `<span class="symptom-tag" style="font-size:0.9rem">${sym}</span>`).join('')}</div>
                    ${formulaHtml}
                `;
            }
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${currentDeck.length}`;
        }

        function toggleMode() {
            isDiseaseMode = !isDiseaseMode;
            document.getElementById('modeBtn').textContent = isDiseaseMode ? "Mode: Disease View" : "Mode: Syndrome View";
            buildDeck();
        }

        function shuffleDeck() { currentDeck.sort(() => Math.random() - 0.5); currentIndex = 0; updateCard(); }
        function nextCard() { currentIndex = (currentIndex + 1) % currentDeck.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + currentDeck.length) % currentDeck.length; updateCard(); }

        document.getElementById('card').addEventListener('click', function() { this.classList.toggle('flipped'); });
        buildDeck();
    </script>
</body>
</html>
