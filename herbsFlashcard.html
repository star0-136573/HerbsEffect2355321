<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Med Flashcards</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #020408;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", sans-serif;
            color: white;
            touch-action: manipulation;
        }

        /* Star Background */
        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at top, #0d1b2a 0%, #020408 100%);
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle var(--d) infinite ease-in-out;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }

        /* Mobile Optimized Card */
        .card-container {
            width: 85vw;
            max-width: 340px;
            height: 60vh;
            max-height: 450px;
            perspective: 1000px;
            margin-bottom: 30px;
          
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
              
        }

        .card.flipped { transform: rotateY(180deg); }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 28px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .back { transform: rotateY(180deg); }

        .name-text { font-size: 2.8rem; font-weight: 600; letter-spacing: 2px; color:#f56f0e }
        .effect-text { font-size: 1.3rem; line-height: 1.8; font-weight: 300; color: #0adcf3; }

        /* Mobile Nav Layout */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 85vw;
            max-width: 340px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            grid-column: span 2;
            margin-bottom: 10px;
        }

        button {
            background: var(--glass);
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            margin: 0 5px;
        }

        button:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.96); }
        
        .special-btn { 
            background: rgba(100, 200, 255, 0.1); 
            border-color: rgba(100, 200, 255, 0.3);
            color: #80d4ff;
        }

        .counter { position: absolute; top: 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div class="counter" id="counter">1 / 2</div>

    <div class="card-container" onclick="toggleFlip()">
        <div class="card" id="card">
            <div class="face front" id="front-face"></div>
            <div class="face back" id="back-face"></div>
        </div>
    </div>

    <div class="controls-grid">
        <div class="nav-buttons">
            <button onclick="changeCard(-1, event)">Prev</button>
            <button onclick="changeCard(1, event)">Next</button>
        </div>
        <button class="special-btn" onclick="toggleMode(event)">Swap Side</button>
        <button class="special-btn" onclick="shuffleCards(event)">Shuffle</button>
    </div>

    <script>
        let medicineData = [
            {name:"麻黃", effects:"發汗解表<br>宣肺平喘<br>利水消腫"},
            {name:"桂枝", effects:"發汗解肌<br>溫經通脈<br>通陽化氣"}
        ];

        let index = 0;
        let studyEffectsFirst = false;
        const cardElement = document.getElementById('card');

        function render() {
            cardElement.classList.remove('flipped');
            const front = document.getElementById('front-face');
            const back = document.getElementById('back-face');
            const item = medicineData[index];

            if (studyEffectsFirst) {
                front.innerHTML = `<div class="effect-text">${item.effects}</div>`;
                back.innerHTML = `<div class="name-text">${item.name}</div>`;
            } else {
                front.innerHTML = `<div class="name-text">${item.name}</div>`;
                back.innerHTML = `<div class="effect-text">${item.effects}</div>`;
            }
            document.getElementById('counter').innerText = `${index + 1} / ${medicineData.length}`;
        }

        function toggleFlip() { cardElement.classList.toggle('flipped'); }

        function changeCard(step, e) {
            e.stopPropagation();
            index = (index + step + medicineData.length) % medicineData.length;
            render();
        }

        function toggleMode(e) {
            e.stopPropagation();
            studyEffectsFirst = !studyEffectsFirst;
            render();
        }

        function shuffleCards(e) {
            e.stopPropagation();
            medicineData.sort(() => Math.random() - 0.5);
            index = 0;
            render();
        }

        // Star background
        const starBox = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            starBox.appendChild(s);
        }

        render();
    </script>
</body>
</html>
